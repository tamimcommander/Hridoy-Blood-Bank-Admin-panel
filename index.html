<!DOCTYPE html>
<html lang="en">
<head>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1);
            text-align: center;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
            margin-bottom: 16px;
            transition: 0.2s;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #ff3b3b;
            box-shadow: 0 0 0 3px rgba(255,59,59,0.1);
        }

        .btn-action {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff3b3b, #d32f2f);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .btn-action:active { transform: scale(0.97); }

        #uploadPanel {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 28px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .stat-item {
            background: #fef2f2;
            text-align: center;
            padding: 12px 6px;
            border-radius: 20px;
            font-weight: 700;
        }
        .stat-blood { font-size: 20px; color: #b91c1c; }
        .stat-count { font-size: 26px; font-weight: 800; }

        .table-container {
            overflow-x: auto;
            border-radius: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        th {
            text-align: left;
            padding: 14px 12px;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .blood-badge {
            background: #ffecec;
            color: #ff3b3b;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-sm {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .bg-call { background: #10b981; }
        .bg-edit { background: #3b82f6; }
        .bg-del { background: #ef4444; }

        #editModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 28px;
            border-radius: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .page-btn {
            padding: 6px 14px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .page-btn.active {
            background: #ff3b3b;
            color: white;
            border: none;
        }
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            font-weight: bold;
            font-size: 20px;
        }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .btn-sm { padding: 6px 10px; font-size: 11px; }
        }

            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-bar input, .search-bar select {
            flex: 1;
            min-width: 150px;
            margin-bottom: 0;
        }
    </style>
</head>

<div id="loadingOverlay"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>

<!-- LOGIN BOX -->
<div class="login-container" id="loginBox">

</div>

<div id="uploadPanel">

    <!-- Dashboard + Blood Group Stats -->

            <div class="stat-item">Loading...</div>
        </div>
    </div>

    <!-- Add New Donor -->
    <div class="card">
        <div class="flex-between">
            <h3><i class="fas fa-user-plus"></i> Add New Donor</h3>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 12px;">
            <input type="text" id="newName" placeholder="Full Name">

            <select id="newGroup">

            <select id="newUpazila"><option value="">Select Upazila</option></select>
            <input type="text" id="newArea" placeholder="Village / Area">
        </div>
        <button class="btn-action" style="margin-top: 15px;" onclick="addNewDonor()"><i class="fas fa-save"></i> Save Donor</button>
    </div>

    <!-- Bulk Upload -->
    <div class="card">
        <h3><i class="fas fa-upload"></i> Bulk Upload (JSON)</h3>
        <textarea id="jsonInput" placeholder='[{"name":"Rahim","phone":"017xxxx","bloodGroup":"O+","district":"Dhaka","upazila":"Savar","area":"Nayabazar"}]' rows="2"></textarea>
        <button class="btn-action" onclick="processUpload()">Bulk Submit</button>

    </div>

    <!-- Donor List + Search + Pagination -->
    <div class="card">
        <div class="flex-between">
            <h3>Donor List <span id="donorCount">0</span> donors</h3>
            <button onclick="loadDonors()" class="btn-sm" style="background:#334155;"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div class="search-bar">

                <option value="B-">B-</option><option value="O+">O+</option><option value="O-">O-</option>

                </thead>

            </table>
        </div>
        <div class="pagination" id="paginationControls"></div>
    </div>
</div>

        <label>Blood Group</label>

        <button onclick="closeModal()" style="width:100%; margin-top:12px; background:none; border:none; cursor:pointer; color:gray;">Cancel</button>
    </div>
</div>

    function populateDistricts(selectElement) {
        selectElement.innerHTML = '<option value="">Select District</option>';
        Object.keys(bdData).sort().forEach(dist => {
            let opt = document.createElement("option"); opt.value = dist; opt.innerText = dist;
            selectElement.appendChild(opt);
        });
    }

    const newDistrictSel = document.getElementById("newDistrict");
    const newUpazilaSel = document.getElementById("newUpazila");
    populateDistricts(newDistrictSel);
    window.loadUpazilasForNew = function() {
        const dist = newDistrictSel.value;
        newUpazilaSel.innerHTML = '<option value="">Select Upazila</option>';
        if(dist && bdData[dist]) {
            bdData[dist].sort().forEach(upa => {
                let opt = document.createElement("option"); opt.value = upa; opt.innerText = upa;
                newUpazilaSel.appendChild(opt);
            });
        }
    };
    newDistrictSel.addEventListener("change", loadUpazilasForNew);

    const editDistrictSel = document.getElementById("editDistrict");
    populateDistricts(editDistrictSel);
    window.loadUpazilasForEdit = function() {
        const dist = editDistrictSel.value;
        const upaSelect = document.getElementById("editUpazila");
        upaSelect.innerHTML = '<option value="">Select Upazila</option>';
        if(dist && bdData[dist]) {
            bdData[dist].sort().forEach(upa => {
                let opt = document.createElement("option"); opt.value = upa; opt.innerText = upa;
                upaSelect.appendChild(opt);
            });
        }
    };
    editDistrictSel.addEventListener("change", loadUpazilasForEdit);

    let allDonors = [];
    let filteredDonors = [];
    let currentPage = 1;
    const rowsPerPage = 12;

    async function loadDonors() {
        document.getElementById("loadingOverlay").style.display = "flex";
        try {
            const snapshot = await fireDb.ref("donors").once("value");
            allDonors = [];
            snapshot.forEach(child => {
                let d = child.val();
                d.id = child.key;
                if(!d.district) d.district = "";
                if(!d.upazila) d.upazila = "";
                if(!d.area) d.area = d.address || "";
                allDonors.push(d);
            });
            allDonors.reverse();
            filterTable();
        } catch(e) { console.error(e); alert("Error loading data"); }
        document.getElementById("loadingOverlay").style.display = "none";
    }

    function filterTable() {
        const search = document.getElementById("searchInput").value.toLowerCase();
        const group = document.getElementById("groupFilter").value;
        const district = document.getElementById("districtFilter").value;
        filteredDonors = allDonors.filter(d => {
            const nameMatch = d.name?.toLowerCase().includes(search);
            const phoneMatch = d.phone?.includes(search);
            const addrMatch = (d.area+d.district+d.upazila)?.toLowerCase().includes(search);
            const groupMatch = !group || d.bloodGroup === group;
            const districtMatch = !district || d.district === district;
            return (nameMatch || phoneMatch || addrMatch) && groupMatch && districtMatch;
        });
        currentPage = 1;
        updateBloodStats();
        renderPagination();
        renderTablePage();
        updateDistrictFilter();
    }

    let debounceTimer;
    function filterTableDebounced() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => filterTable(), 300);
    }

    function renderTablePage() {
        const start = (currentPage-1)*rowsPerPage;
        const paginated = filteredDonors.slice(start, start+rowsPerPage);
        const tbody = document.getElementById("donorTableBody");
        document.getElementById("donorCount").innerText = filteredDonors.length;
        let html = "";
        paginated.forEach(d => {
            let addressDisplay = "";
            if(d.area || d.upazila || d.district) addressDisplay = [d.area, d.upazila, d.district].filter(v=>v).join(", ");
            else addressDisplay = d.address || "N/A";
            html += `<tr>
                <td><b>${escapeHtml(d.name)}</b><br><small>📞 ${d.phone}</small></td>
                <td><span class="blood-badge">${d.bloodGroup}</span></td>
                <td><small>📍 ${escapeHtml(addressDisplay)}</small></td>
                <td><div class="btn-group">
                    <a href="tel:${d.phone}" class="btn-sm bg-call"><i class="fas fa-phone-alt"></i></a>
                    <button class="btn-sm bg-edit" onclick="openEditModal('${d.id}')"><i class="fas fa-pen"></i></button>
                    <button class="btn-sm bg-del" onclick="deleteDonor('${d.id}')"><i class="fas fa-trash"></i></button>
                </div></td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredDonors.length / rowsPerPage);
        const container = document.getElementById("paginationControls");
        if(totalPages <= 1) { container.innerHTML = ""; return; }
        let btns = `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
        for(let i=1; i<=totalPages; i++) {
            if(i===1 || i===totalPages || (i>=currentPage-2 && i<=currentPage+2)) {
                btns += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
            } else if(i===currentPage-3 || i===currentPage+3) btns += `<span>...</span>`;
        }
        btns += `<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
        container.innerHTML = btns;
    }
    function changePage(page) { if(page<1 || page>Math.ceil(filteredDonors.length/rowsPerPage)) return; currentPage=page; renderTablePage(); renderPagination(); }

    function updateBloodStats() {
        const stats = {"A+":0,"A-":0,"B+":0,"B-":0,"O+":0,"O-":0,"AB+":0,"AB-":0};
        filteredDonors.forEach(d => { if(stats[d.bloodGroup] !== undefined) stats[d.bloodGroup]++; });
        const grid = document.getElementById("bloodStatsGrid");
        grid.innerHTML = Object.entries(stats).map(([grp, cnt]) => `<div class="stat-item"><div class="stat-blood">${grp}</div><div class="stat-count">${cnt}</div></div>`).join('');
    }

    function updateDistrictFilter() {
        const districtSet = new Set(allDonors.map(d=>d.district).filter(d=>d));
        const distFilter = document.getElementById("districtFilter");
        const currentVal = distFilter.value;
        distFilter.innerHTML = '<option value="">All Districts</option>';
        [...districtSet].sort().forEach(d => {
            let opt = document.createElement("option"); opt.value = d; opt.innerText = d;
            if(currentVal === d) opt.selected = true;
            distFilter.appendChild(opt);
        });
    }

    async function addNewDonor() {
        const name = document.getElementById("newName").value.trim();
        const phone = document.getElementById("newPhone").value.trim();
        const bloodGroup = document.getElementById("newGroup").value;
        const district = document.getElementById("newDistrict").value;
        const upazila = document.getElementById("newUpazila").value;
        const area = document.getElementById("newArea").value.trim();
        if(!name || !phone) { alert("Name and Phone are required"); return; }
        const newRef = fireDb.ref("donors").push();
        await newRef.set({
            name, phone, bloodGroup, district, upazila, area,
            timestamp: Date.now()
        });
        alert("Donor added successfully");
        document.getElementById("newName").value = "";
        document.getElementById("newPhone").value = "";
        document.getElementById("newArea").value = "";
        loadDonors();
    }

    function openEditModal(id) {
        const donor = allDonors.find(d => d.id === id);
        if(!donor) return;
        document.getElementById("editId").value = donor.id;
        document.getElementById("editName").value = donor.name;
        document.getElementById("editPhone").value = donor.phone;
        document.getElementById("editGroup").value = donor.bloodGroup;
        document.getElementById("editDistrict").value = donor.district || "";
        document.getElementById("editArea").value = donor.area || "";
        loadUpazilasForEdit();
        setTimeout(() => {
            if(donor.upazila) document.getElementById("editUpazila").value = donor.upazila;
        }, 50);
        document.getElementById("editModal").style.display = "flex";
    }

    async function updateDonor() {
        const id = document.getElementById("editId").value;
        const name = document.getElementById("editName").value;
        const phone = document.getElementById("editPhone").value;
        const bloodGroup = document.getElementById("editGroup").value;
        const district = document.getElementById("editDistrict").value;
        const upazila = document.getElementById("editUpazila").value;
        const area = document.getElementById("editArea").value;
        await fireDb.ref("donors/"+id).update({ name, phone, bloodGroup, district, upazila, area });
        closeModal();
        loadDonors();
    }

    // 🔥 DELETION WITHOUT CONFIRMATION – DIRECT REMOVE
    function deleteDonor(id) {
        fireDb.ref("donors/"+id).remove().then(() => loadDonors());
    }

    function processUpload() {
        try {
            const data = JSON.parse(document.getElementById("jsonInput").value);
            const list = Array.isArray(data) ? data : [data];
            const updates = {};
            for(let item of list) {
                const key = fireDb.ref().child('donors').push().key;
                updates[`/donors/${key}`] = {
                    name: item.name || "Unknown",
                    phone: item.phone || "N/A",
                    bloodGroup: item.bloodGroup || item.group || "N/A",
                    district: item.district || "",
                    upazila: item.upazila || "",
                    area: item.area || item.address || "",
                    timestamp: Date.now()
                };
            }
            fireDb.ref().update(updates).then(()=>{ alert("Bulk upload successful!"); document.getElementById("jsonInput").value=""; loadDonors(); });
        } catch(e) { alert("Invalid JSON format"); }
    }

    function exportToCSV() {
        let dataToExport = filteredDonors.length ? filteredDonors : allDonors;
        const headers = ["Name", "Phone", "Blood Group", "District", "Upazila", "Area"];
        const rows = dataToExport.map(d => [d.name, d.phone, d.bloodGroup, d.district||"", d.upazila||"", d.area||""]);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], {type: "text/csv;charset=utf-8;"});
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url; link.setAttribute("download","donors_export.csv"); document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
    }

    function closeModal() { document.getElementById("editModal").style.display = "none"; }
    function checkLogin() {
        if(document.getElementById("password").value === "335877") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("uploadPanel").style.display = "block";
            loadDonors();
        } else alert("Incorrect Password!");
    }
    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
</script>
</body>
